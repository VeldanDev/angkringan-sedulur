<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none" stroke="#C8840A" stroke-width="1" stroke-opacity="0.7" stroke-linecap="round" stroke-linejoin="round">
  <!-- Wooden surface - evenly spaced horizontal lines across bottom third -->
  <line x1="0" y1="200" x2="400" y2="200" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="0" y1="212" x2="400" y2="212" stroke-opacity="0.4"/>
  <line x1="0" y1="222" x2="400" y2="222" stroke-opacity="0.3"/>
  <line x1="0" y1="232" x2="400" y2="232" stroke-opacity="0.2"/>
  <line x1="0" y1="242" x2="400" y2="242" stroke-opacity="0.15"/>
  <line x1="0" y1="252" x2="400" y2="252" stroke-opacity="0.1"/>
  <line x1="0" y1="262" x2="400" y2="262" stroke-opacity="0.08"/>
  <!-- Wood grain texture lines -->
  <path d="M50 200 C60 210 55 220 65 232" stroke-opacity="0.2"/>
  <path d="M150 200 C158 215 154 225 162 240" stroke-opacity="0.2"/>
  <path d="M250 200 C244 212 248 224 242 236" stroke-opacity="0.2"/>
  <path d="M340 200 C348 214 344 226 350 242" stroke-opacity="0.2"/>
  <!-- Short cup (left) - trapezoid body -->
  <path d="M120 200 L126 130 L174 130 L180 200"/>
  <path d="M120 200 C120 200 136 204 150 204 C164 204 180 200 180 200"/>
