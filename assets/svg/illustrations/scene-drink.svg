  <!-- Coffee surface in cup -->
  <ellipse cx="150" cy="132" rx="23" ry="5" stroke-opacity="0.6"/>
  <!-- Steam above cup -->
  <path d="M138 122 C136 114 138 106 136 98 C134 90 136 82 134 74"/>
  <path d="M150 120 C152 112 150 104 152 96 C154 88 152 80 154 72"/>
  <path d="M162 122 C160 114 162 106 160 98 C158 90 160 82 158 74"/>
  <!-- Tall glass (right) - slightly tapered -->
  <path d="M244 200 L240 90 L296 90 L292 200"/>
  <path d="M244 200 C244 204 292 204 292 200"/>
  <!-- Liquid level in tall glass -->
  <line x1="241" y1="106" x2="295" y2="106" stroke-opacity="0.5"/>
  <!-- Steam above tall glass -->
  <path d="M260 82 C258 74 260 66 258 58"/>
  <path d="M276 80 C278 72 276 64 278 56"/>
