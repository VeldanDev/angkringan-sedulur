<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none" stroke="#C8840A" stroke-width="1" stroke-opacity="0.7" stroke-linecap="round" stroke-linejoin="round">
  <!-- Table top-down view (large rectangle) -->
  <rect x="60" y="40" width="280" height="200" rx="12"/>
  <!-- Center bowl (top-down, largest) -->
  <circle cx="200" cy="140" r="50"/>
  <circle cx="200" cy="140" r="38" stroke-opacity="0.5"/>
  <!-- Steam lines from center bowl -->
  <path d="M190 90 C188 82 190 74 188 66"/>
  <path d="M200 88 C202 80 200 72 202 64"/>
  <path d="M210 90 C212 82 210 74 212 66"/>
  <!-- Top-left bowl -->
  <circle cx="110" cy="90" r="28"/>
  <circle cx="110" cy="90" r="20" stroke-opacity="0.5"/>
  <!-- Top-right bowl -->
  <circle cx="290" cy="90" r="24"/>
  <circle cx="290" cy="90" r="16" stroke-opacity="0.5"/>
  <!-- Bottom-left plate -->
  <ellipse cx="110" cy="190" rx="30" ry="26"/>
  <ellipse cx="110" cy="190" rx="22" ry="18" stroke-opacity="0.5"/>
  <!-- Bottom-right small plate -->
  <ellipse cx="290" cy="190" rx="26" ry="22"/>
  <ellipse cx="290" cy="190" rx="18" ry="14" stroke-opacity="0.5"/>
  <!-- Chopsticks beside center bowl -->
  <line x1="258" y1="110" x2="272" y2="160"/>
  <line x1="262" y1="108" x2="276" y2="158"/>
  <!-- Small cup top-down (top area) -->
  <circle cx="200" cy="60" r="16"/>
  <circle cx="200" cy="60" r="10" stroke-opacity="0.5"/>
  <!-- Food textures in bowls (dots suggesting rice/food) -->
  <circle cx="107" cy="87" r="2" fill="#C8840A" fill-opacity="0.3" stroke="none"/>
  <circle cx="114" cy="94" r="1.5" fill="#C8840A" fill-opacity="0.3" stroke="none"/>
  <circle cx="108" cy="95" r="1.5" fill="#C8840A" fill-opacity="0.3" stroke="none"/>
  <circle cx="197" cy="136" r="3" fill="#C8840A" fill-opacity="0.3" stroke="none"/>
  <circle cx="206" cy="143" r="2.5" fill="#C8840A" fill-opacity="0.3" stroke="none"/>
  <circle cx="195" cy="148" r="2" fill="#C8840A" fill-opacity="0.3" stroke="none"/>
</svg>
