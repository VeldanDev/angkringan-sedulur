<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <!-- Cart Illustration -->
  <!-- Left wheel -->
  <circle cx="72" cy="100" r="28" stroke="#E8A820" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="72" y1="72" x2="72" y2="100" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="72" y1="100" x2="72" y2="128" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="44" y1="100" x2="72" y2="100" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="72" y1="100" x2="100" y2="100" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="52" y1="80" x2="72" y2="100" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="72" y1="100" x2="92" y2="120" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="92" y1="80" x2="72" y2="100" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="72" y1="100" x2="52" y2="120" stroke="#E8A820" stroke-width="1.2"/>
  <circle cx="72" cy="100" r="4" stroke="#E8A820" stroke-width="1.2"/>
  <!-- Right wheel -->
  <circle cx="228" cy="100" r="28" stroke="#E8A820" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="228" y1="72" x2="228" y2="100" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="228" y1="100" x2="228" y2="128" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="200" y1="100" x2="228" y2="100" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="228" y1="100" x2="256" y2="100" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="208" y1="80" x2="228" y2="100" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="228" y1="100" x2="248" y2="120" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="248" y1="80" x2="228" y2="100" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="228" y1="100" x2="208" y2="120" stroke="#E8A820" stroke-width="1.2"/>
  <circle cx="228" cy="100" r="4" stroke="#E8A820" stroke-width="1.2"/>
  <!-- Horizontal bamboo pole -->
  <line x1="100" y1="68" x2="200" y2="68" stroke="#E8A820" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Pole supports from wheels -->
  <line x1="72" y1="72" x2="100" y2="68" stroke="#E8A820" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="228" y1="72" x2="200" y2="68" stroke="#E8A820" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chain for lantern -->
  <line x1="150" y1="68" x2="150" y2="76" stroke="#E8A820" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- Lantern body -->
  <path d="M142 76 L142 94 C142 97 146 99 150 99 C154 99 158 97 158 94 L158 76 C158 73 154 71 150 71 C146 71 142 73 142 76Z" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="142" y1="80" x2="158" y2="80" stroke="#E8A820" stroke-width="0.8"/>
  <line x1="142" y1="85" x2="158" y2="85" stroke="#E8A820" stroke-width="0.8"/>
  <line x1="142" y1="90" x2="158" y2="90" stroke="#E8A820" stroke-width="0.8"/>
  <!-- Flame inside lantern -->
  <path d="M150 93 C148 91 147 88 150 85 C153 88 152 91 150 93Z" stroke="#E8A820" stroke-width="0.9" fill="rgba(232,168,32,0.3)"/>
  <!-- Cart body platform -->
  <rect x="100" y="108" width="100" height="14" rx="2" stroke="#E8A820" stroke-width="1.5"/>
  <!-- Food containers on cart -->
  <ellipse cx="125" cy="104" rx="10" ry="5" stroke="#E8A820" stroke-width="1.2"/>
  <path d="M115 104 C115 98 135 98 135 104" stroke="#E8A820" stroke-width="1.2"/>
  <ellipse cx="152" cy="104" rx="10" ry="5" stroke="#E8A820" stroke-width="1.2"/>
  <path d="M142 104 C142 98 162 98 162 104" stroke="#E8A820" stroke-width="1.2"/>
  <!-- Thermos/rice cooker right side -->
  <rect x="175" y="95" width="14" height="18" rx="3" stroke="#E8A820" stroke-width="1.2"/>
  <line x1="175" y1="100" x2="189" y2="100" stroke="#E8A820" stroke-width="0.8"/>

  <!-- Brand name text -->
  <text x="150" y="146" font-family="Cormorant Garamond, serif" font-size="22" font-weight="600" fill="#E8A820" text-anchor="middle" letter-spacing="3">ANGKRINGAN SEDULUR</text>

  <!-- Divider line -->
  <line x1="60" y1="158" x2="240" y2="158" stroke="#886040" stroke-width="0.8"/>

  <!-- Location sub-text -->
  <text x="150" y="172" font-family="Cormorant Garamond, serif" font-size="9" fill="#886040" text-anchor="middle" letter-spacing="2">SIPARE-PARE · BATU BARA</text>
</svg>
